kind = "web"
previewPath = "/"
title = "BIR Form Application"
version = "1.0.0"
id = "artifacts/bir-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18458

[services.development]
run = "pnpm --filter @workspace/bir-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bir-app", "run", "build" ]
publicDir = "artifacts/bir-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18458"
BASE_PATH = "/"
